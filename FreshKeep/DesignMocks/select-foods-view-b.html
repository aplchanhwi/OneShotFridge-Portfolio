<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SelectFoodsView Concept B</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f2f2f7;
      --surface: #ffffff;
      --text: #1c1c1e;
      --secondary: #6e6e73;
      --green: #34c759;
      --green-soft: #e7f6eb;
      --orange: #ff9500;
      --orange-soft: #fff1dc;
      --red: #ff3b30;
      --red-soft: #ffe8e6;
      --blue: #007aff;
      --line: rgba(60, 60, 67, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #dadade;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .phone {
      width: min(100vw, 430px);
      height: min(100vh, 932px);
      overflow: auto;
      background: var(--page);
      padding-bottom: 104px;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 18px 18px 10px;
      background: rgba(242, 242, 247, 0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav button {
      border: 0;
      background: transparent;
      color: var(--green);
      font-size: 16px;
      padding: 4px 0;
    }

    .nav .done {
      font-weight: 800;
      font-size: 17px;
    }

    h1 {
      margin: 18px 0 0;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero {
      margin: 12px 16px 0;
      padding: 16px;
      border-radius: 12px;
      background: var(--surface);
    }

    .hero-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hero-copy {
      min-width: 0;
    }

    .hero h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .hero p {
      margin: 5px 0 0;
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.35;
    }

    .meter {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background:
        conic-gradient(var(--green) 0 62%, rgba(52, 199, 89, 0.14) 62% 100%);
    }

    .meter-inner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--surface);
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 800;
      color: var(--green);
      line-height: 1;
    }

    .meter-inner small {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      color: var(--secondary);
      font-weight: 700;
    }

    .suggestion {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: var(--green-soft);
      color: #146b2e;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 650;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 16px 16px 8px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-weight: 650;
      white-space: nowrap;
    }

    .chip.active {
      background: var(--green);
      color: #fff;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 8px;
    }

    .section-title h3 {
      margin: 0;
      font-size: 13px;
      color: var(--secondary);
      letter-spacing: 0;
      font-weight: 700;
    }

    .section-title button {
      border: 0;
      background: transparent;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      padding: 0;
    }

    .list {
      margin: 0 16px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }

    .row {
      width: 100%;
      border: 0;
      background: var(--surface);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      text-align: left;
    }

    .row.expired {
      background: linear-gradient(90deg, rgba(255, 59, 48, 0.16), #fff 38%);
      box-shadow: inset 5px 0 0 var(--red);
    }

    .row.today,
    .row.urgent {
      background: linear-gradient(90deg, rgba(255, 149, 0, 0.16), #fff 38%);
      box-shadow: inset 5px 0 0 var(--orange);
    }

    .row + .row {
      border-top: 1px solid var(--line);
    }

    .status {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: rgba(142, 142, 147, 0.25);
    }

    .row.expired .status {
      background: var(--red);
    }

    .row.today .status,
    .row.urgent .status {
      background: var(--orange);
    }

    .food-copy {
      min-width: 0;
      flex: 1;
    }

    .food-copy strong {
      display: block;
      font-size: 17px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .food-copy span {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      color: var(--secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row.expired .food-copy span {
      color: var(--red);
    }

    .row.today .food-copy span,
    .row.urgent .food-copy span {
      color: var(--orange);
    }

    .tag {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(142, 142, 147, 0.14);
      color: var(--secondary);
    }

    .tag::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-right: 5px;
      border-radius: 50%;
      background: currentColor;
      vertical-align: 1px;
    }

    .row.expired .tag {
      background: var(--red-soft);
      color: var(--red);
    }

    .row.today .tag,
    .row.urgent .tag {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1.5px solid rgba(142, 142, 147, 0.3);
      color: transparent;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .row.selected .check {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .bottom {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100vw, 430px);
      padding: 12px 16px 22px;
      background: rgba(242, 242, 247, 0.9);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .bottom button {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 12px;
      background: var(--green);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="phone">
    <header class="nav">
      <div class="nav-top">
        <button>‹ 냉장고</button>
        <button class="done">다음</button>
      </div>
      <h1>식재료 고르기</h1>
    </header>

    <section class="hero">
      <div class="hero-line">
        <div class="hero-copy">
          <h2>오늘은 임박 재료부터 골라볼까요?</h2>
          <p>선택한 재료가 많아질수록 만들 수 있는 레시피 폭이 넓어져요.</p>
        </div>
        <div class="meter" aria-label="선택 비율">
          <div class="meter-inner"><span id="count-b">4</span><small>선택</small></div>
        </div>
      </div>
      <div class="suggestion">추천 조합: 닭가슴살, 상추, 우유를 고르면 가벼운 샐러드 레시피가 잘 맞아요.</div>
    </section>

    <nav class="chips" aria-label="필터">
      <button class="chip active">추천순</button>
      <button class="chip">기한순</button>
      <button class="chip">선택됨</button>
      <button class="chip">전체</button>
    </nav>

    <div class="section-title">
      <h3>먼저 쓰면 좋은 식재료</h3>
      <button>모두 선택</button>
    </div>
    <section class="list" aria-label="임박 식재료">
      <button class="row expired selected">
        <span class="status"></span>
        <span class="food-copy"><strong>닭가슴살</strong><span>1일 지났습니다.</span></span>
        <span class="tag">기한 지남</span>
        <span class="check">✓</span>
      </button>
      <button class="row today selected">
        <span class="status"></span>
        <span class="food-copy"><strong>식빵</strong><span>오늘까지예요.</span></span>
        <span class="tag">오늘</span>
        <span class="check">✓</span>
      </button>
      <button class="row urgent selected">
        <span class="status"></span>
        <span class="food-copy"><strong>우유</strong><span>1일 남았습니다.</span></span>
        <span class="tag">임박</span>
        <span class="check">✓</span>
      </button>
      <button class="row urgent selected">
        <span class="status"></span>
        <span class="food-copy"><strong>상추</strong><span>2일 남았습니다.</span></span>
        <span class="tag">임박</span>
        <span class="check">✓</span>
      </button>
    </section>

    <div class="section-title">
      <h3>나머지 식재료</h3>
      <button>이름순</button>
    </div>
    <section class="list" aria-label="나머지 식재료">
      <button class="row">
        <span class="status"></span>
        <span class="food-copy"><strong>계란</strong><span>5일 남았습니다.</span></span>
        <span class="tag">여유</span>
        <span class="check">✓</span>
      </button>
      <button class="row">
        <span class="status"></span>
        <span class="food-copy"><strong>삼겹살</strong><span>7일 남았습니다.</span></span>
        <span class="tag">여유</span>
        <span class="check">✓</span>
      </button>
      <button class="row">
        <span class="status"></span>
        <span class="food-copy"><strong>요거트</strong><span>4일 남았습니다.</span></span>
        <span class="tag">여유</span>
        <span class="check">✓</span>
      </button>
      <button class="row">
        <span class="status"></span>
        <span class="food-copy"><strong>냉동 만두</strong><span>90일 남았습니다.</span></span>
        <span class="tag">여유</span>
        <span class="check">✓</span>
      </button>
    </section>

    <footer class="bottom">
      <button><span id="count-b-footer">4</span>개로 레시피 만들기</button>
    </footer>
  </div>

  <script>
    const countB = document.querySelector("#count-b");
    const countBFooter = document.querySelector("#count-b-footer");
    const refreshB = () => {
      const count = document.querySelectorAll(".row.selected").length;
      countB.textContent = count;
      countBFooter.textContent = count;
    };

    document.querySelectorAll(".row").forEach((row) => {
      row.addEventListener("click", () => {
        row.classList.toggle("selected");
        refreshB();
      });
    });
  </script>
</body>
</html>
