<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SelectFoodsView Concept A</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f2f2f7;
      --surface: #ffffff;
      --group: #f7f7fb;
      --text: #1c1c1e;
      --secondary: #6e6e73;
      --separator: #e5e5ea;
      --green: #34c759;
      --green-soft: #e7f6eb;
      --orange: #ff9500;
      --orange-soft: #fff1dc;
      --red: #ff3b30;
      --red-soft: #ffe8e6;
      --blue: #007aff;
      --blue-soft: #e5f1ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #d9d9df;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .phone {
      width: min(100vw, 430px);
      height: min(100vh, 932px);
      overflow: hidden;
      background: var(--page);
      display: flex;
      flex-direction: column;
    }

    .nav {
      padding: 18px 18px 10px;
      background: rgba(242, 242, 247, 0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 32px;
    }

    .back {
      border: 0;
      background: transparent;
      color: var(--green);
      font-size: 16px;
      padding: 4px 0;
    }

    .next {
      border: 0;
      background: transparent;
      color: var(--green);
      font-size: 17px;
      font-weight: 700;
      padding: 4px 0;
    }

    h1 {
      margin: 18px 0 0;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    main {
      overflow: auto;
      padding-bottom: 98px;
    }

    .dashboard {
      margin: 12px 16px 0;
      padding: 16px;
      background: var(--surface);
      border-radius: 12px;
    }

    .dashboard-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .symbol {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      background: var(--orange);
      font-weight: 800;
    }

    .dashboard h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .dashboard p {
      margin: 5px 0 0;
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.35;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .summary {
      min-width: 0;
      border-radius: 10px;
      padding: 12px;
    }

    .summary span {
      display: block;
      color: var(--secondary);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      line-height: 1;
    }

    .summary.red {
      background: var(--red-soft);
      color: var(--red);
    }

    .summary.orange {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .summary.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 16px 16px 8px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      border: 0;
      border-radius: 999px;
      background: var(--surface);
      padding: 8px 12px;
      color: var(--text);
      white-space: nowrap;
      font-size: 15px;
      font-weight: 600;
    }

    .chip strong {
      display: inline-flex;
      min-width: 22px;
      height: 20px;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      border-radius: 999px;
      background: rgba(142, 142, 147, 0.16);
      font-size: 12px;
    }

    .chip.active {
      background: var(--green);
      color: #fff;
    }

    .chip.active strong {
      background: rgba(255, 255, 255, 0.22);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 8px 16px 20px;
    }

    .food {
      position: relative;
      min-height: 108px;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      background: var(--surface);
      text-align: left;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.03);
    }

    .food.expired {
      background: var(--red-soft);
      box-shadow: inset 0 0 0 1px rgba(255, 59, 48, 0.16);
    }

    .food.today,
    .food.urgent {
      background: var(--orange-soft);
      box-shadow: inset 0 0 0 1px rgba(255, 149, 0, 0.16);
    }

    .food.expired::before,
    .food.today::before,
    .food.urgent::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      border-radius: 12px 0 0 12px;
    }

    .food.expired::before {
      background: var(--red);
    }

    .food.today::before,
    .food.urgent::before {
      background: var(--orange);
    }

    .food.selected {
      background: var(--green);
      color: #fff;
      box-shadow: none;
    }

    .food .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: block;
      margin-bottom: 16px;
      background: var(--secondary);
      opacity: 0.25;
    }

    .food.expired .dot {
      background: var(--red);
      opacity: 1;
    }

    .food.today .dot,
    .food.urgent .dot {
      background: var(--orange);
      opacity: 1;
    }

    .food.selected .dot {
      background: #fff;
      opacity: 0.95;
    }

    .food-name {
      display: block;
      font-size: 18px;
      font-weight: 750;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .food-date {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .food.expired .food-date {
      color: var(--red);
    }

    .food.today .food-date,
    .food.urgent .food-date {
      color: var(--orange);
    }

    .food.selected .food-date {
      color: rgba(255, 255, 255, 0.82);
    }

    .check {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.24);
      color: transparent;
      font-size: 14px;
      font-weight: 900;
    }

    .urgency-label {
      position: absolute;
      top: 12px;
      right: 44px;
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 850;
      line-height: 1;
      color: var(--secondary);
      background: rgba(142, 142, 147, 0.14);
    }

    .food.expired .urgency-label {
      color: var(--red);
      background: rgba(255, 59, 48, 0.12);
    }

    .food.today .urgency-label,
    .food.urgent .urgency-label {
      color: #9a5a00;
      background: rgba(255, 149, 0, 0.16);
    }

    .food.selected .check {
      color: #fff;
    }

    .food.selected .urgency-label {
      color: #fff;
      background: rgba(255, 255, 255, 0.22);
    }

    .bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100vw, 430px);
      padding: 12px 16px 22px;
      background: rgba(242, 242, 247, 0.88);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .bottom-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .count {
      flex: 1;
      min-width: 0;
    }

    .count strong {
      display: block;
      font-size: 15px;
    }

    .count span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .primary {
      width: 128px;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--green);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="phone">
    <header class="nav">
      <div class="nav-row">
        <button class="back">‹ 냉장고</button>
        <button class="next">다음</button>
      </div>
      <h1>식재료 고르기</h1>
    </header>

    <main>
      <section class="dashboard" aria-label="선택 요약">
        <div class="dashboard-head">
          <div class="symbol">!</div>
          <div>
            <h2>먼저 쓰면 좋은 식재료 4개</h2>
            <p>기한이 가까운 재료를 중심으로 레시피 후보를 만들 수 있어요.</p>
          </div>
        </div>
        <div class="summary-grid">
          <div class="summary red"><span>기한 지남</span><strong>1</strong></div>
          <div class="summary orange"><span>오늘까지</span><strong>1</strong></div>
          <div class="summary blue"><span>선택됨</span><strong id="selected-count-a">3</strong></div>
        </div>
      </section>

      <nav class="chips" aria-label="필터">
        <button class="chip active">전체 <strong>9</strong></button>
        <button class="chip">기한 지남 <strong>1</strong></button>
        <button class="chip">임박 <strong>4</strong></button>
        <button class="chip">여유 <strong>4</strong></button>
      </nav>

      <section class="grid" aria-label="식재료 목록">
        <button class="food expired selected">
          <span class="dot"></span>
          <span class="urgency-label">기한 지남</span>
          <span class="check">✓</span>
          <span class="food-name">닭가슴살</span>
          <span class="food-date">1일 지났습니다.</span>
        </button>
        <button class="food today selected">
          <span class="dot"></span>
          <span class="urgency-label">오늘</span>
          <span class="check">✓</span>
          <span class="food-name">식빵</span>
          <span class="food-date">오늘까지예요.</span>
        </button>
        <button class="food urgent selected">
          <span class="dot"></span>
          <span class="urgency-label">임박</span>
          <span class="check">✓</span>
          <span class="food-name">상추</span>
          <span class="food-date">2일 남았습니다.</span>
        </button>
        <button class="food urgent">
          <span class="dot"></span>
          <span class="urgency-label">임박</span>
          <span class="check">✓</span>
          <span class="food-name">우유</span>
          <span class="food-date">1일 남았습니다.</span>
        </button>
        <button class="food urgent">
          <span class="dot"></span>
          <span class="urgency-label">임박</span>
          <span class="check">✓</span>
          <span class="food-name">콩나물</span>
          <span class="food-date">3일 남았습니다.</span>
        </button>
        <button class="food">
          <span class="dot"></span>
          <span class="check">✓</span>
          <span class="food-name">계란</span>
          <span class="food-date">5일 남았습니다.</span>
        </button>
        <button class="food">
          <span class="dot"></span>
          <span class="check">✓</span>
          <span class="food-name">삼겹살</span>
          <span class="food-date">7일 남았습니다.</span>
        </button>
        <button class="food">
          <span class="dot"></span>
          <span class="check">✓</span>
          <span class="food-name">냉동 만두</span>
          <span class="food-date">90일 남았습니다.</span>
        </button>
      </section>
    </main>

    <footer class="bottom-bar">
      <div class="bottom-row">
        <div class="count">
          <strong><span id="selected-count-a-footer">3</span>개 선택됨</strong>
          <span>선택한 식재료로 레시피 옵션을 고릅니다.</span>
        </div>
        <button class="primary">다음</button>
      </div>
    </footer>
  </div>

  <script>
    const selectedCountA = document.querySelector("#selected-count-a");
    const selectedCountAFooter = document.querySelector("#selected-count-a-footer");
    const updateCountA = () => {
      const count = document.querySelectorAll(".food.selected").length;
      selectedCountA.textContent = count;
      selectedCountAFooter.textContent = count;
    };

    document.querySelectorAll(".food").forEach((button) => {
      button.addEventListener("click", () => {
        button.classList.toggle("selected");
        updateCountA();
      });
    });
  </script>
</body>
</html>
