<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" role="img" aria-labelledby="title desc">
  <title id="title">Image payload size comparison</title>
  <desc id="desc">Average image bytes reduced from 3.68 MB to 0.36 MB. Average base64 length reduced from 5,151,717 characters to 503,123 characters.</desc>
  <rect width="760" height="340" fill="#ffffff"/>
  <text x="36" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">전송량 변화</text>
  <text x="36" y="70" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">이미지 리사이징과 JPEG 압축률 조정 결과</text>
  <line x1="160" y1="270" x2="700" y2="270" stroke="#d1d5db" stroke-width="1"/>
  <g>
    <text x="36" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">이미지 크기</text>
    <rect x="160" y="110" width="500" height="28" rx="4" fill="#2563eb"/>
    <rect x="160" y="150" width="48.9" height="28" rx="4" fill="#10b981"/>
    <text x="670" y="130" font-family="Arial, sans-serif" font-size="14" fill="#111827">3.68MB</text>
    <text x="220" y="170" font-family="Arial, sans-serif" font-size="14" fill="#111827">0.36MB</text>
  </g>
  <g>
    <text x="36" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">base64 길이</text>
    <rect x="160" y="200" width="500" height="28" rx="4" fill="#2563eb"/>
    <rect x="160" y="240" width="48.8" height="28" rx="4" fill="#10b981"/>
    <text x="670" y="220" font-family="Arial, sans-serif" font-size="14" fill="#111827">5.15M</text>
    <text x="220" y="260" font-family="Arial, sans-serif" font-size="14" fill="#111827">0.50M</text>
  </g>
  <text x="36" y="310" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">평균 전송 이미지 크기 90.2% 감소</text>
  <rect x="470" y="36" width="14" height="14" fill="#2563eb"/>
  <text x="490" y="48" font-family="Arial, sans-serif" font-size="13" fill="#374151">Baseline</text>
  <rect x="570" y="36" width="14" height="14" fill="#10b981"/>
  <text x="590" y="48" font-family="Arial, sans-serif" font-size="13" fill="#374151">Image Resize</text>
</svg>
