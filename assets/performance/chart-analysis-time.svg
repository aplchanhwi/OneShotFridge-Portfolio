<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Average analysis time comparison</title>
  <desc id="desc">Baseline average client total time was 19.47 seconds, image resize average client total time was 10.10 seconds. Baseline average Gemini time was 12.87 seconds, image resize average Gemini time was 8.06 seconds.</desc>
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="36" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">분석 시간 변화</text>
  <text x="36" y="70" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">단위: 초, 10회 평균</text>
  <line x1="150" y1="285" x2="700" y2="285" stroke="#d1d5db" stroke-width="1"/>
  <line x1="150" y1="105" x2="150" y2="285" stroke="#d1d5db" stroke-width="1"/>
  <text x="95" y="289" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">0</text>
  <text x="88" y="244" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">5</text>
  <text x="82" y="199" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">10</text>
  <text x="82" y="154" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">15</text>
  <text x="82" y="109" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">20</text>
  <g>
    <text x="36" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">전체 분석 시간</text>
    <rect x="150" y="112" width="486.8" height="28" rx="4" fill="#2563eb"/>
    <rect x="150" y="152" width="252.5" height="28" rx="4" fill="#10b981"/>
    <text x="646" y="132" font-family="Arial, sans-serif" font-size="14" fill="#111827">19.47s</text>
    <text x="412" y="172" font-family="Arial, sans-serif" font-size="14" fill="#111827">10.10s</text>
  </g>
  <g>
    <text x="36" y="232" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Gemini 호출 시간</text>
    <rect x="150" y="202" width="321.8" height="28" rx="4" fill="#2563eb"/>
    <rect x="150" y="242" width="201.5" height="28" rx="4" fill="#10b981"/>
    <text x="481" y="222" font-family="Arial, sans-serif" font-size="14" fill="#111827">12.87s</text>
    <text x="361" y="262" font-family="Arial, sans-serif" font-size="14" fill="#111827">8.06s</text>
  </g>
  <rect x="470" y="36" width="14" height="14" fill="#2563eb"/>
  <text x="490" y="48" font-family="Arial, sans-serif" font-size="13" fill="#374151">Baseline</text>
  <rect x="570" y="36" width="14" height="14" fill="#10b981"/>
  <text x="590" y="48" font-family="Arial, sans-serif" font-size="13" fill="#374151">Image Resize</text>
</svg>
